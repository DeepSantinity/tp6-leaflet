<!DOCTYPE html>
<html>
<head>
  <title>Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>
<div id="map" style="height: 500px;"></div>
    <script>
  var map = L.map('map').setView([-34.6037, -58.3816], 13);
</script>
    <script>
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
</script>
<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);
</script>
<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);
  marker.bindPopup("Hola! Soy un popup 😄");
</script>


<script>
  var marker = L.marker([35.6895, 139.6917]).addTo(map);
</script><script>
  var marker = L.marker([55.4521, 37.3704]).addTo(map);
</script><script>
  var marker = L.marker([4.5981, -74.0758]).addTo(map);
</script>
<script>var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);


var circle = L.circle([35.6895, 139.6917], {
    color: 'red',
    fillColor: '#f03',
    fillOpacity: 0.5,
    radius: 500
}).addTo(map);


</script>
<script>
    var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
});

var osmHOT = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors, Tiles style by Humanitarian OpenStreetMap Team hosted by OpenStreetMap France'});

var map = L.map('map', {
    center: [39.73, -104.99],
    zoom: 10,
    layers: [osm, cities]
});
</script>
<script>
    var baseMaps = {
    "OpenStreetMap": osm,
    "OpenStreetMap.HOT": osmHOT
};

var overlayMaps = {
    "Cities": cities
};
</script>
<script>
    var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);
</script>
<script>
var greenIcon = L.icon({
    iconUrl: 'junk.jpg',
    shadowUrl: 'leaf-shadow.png',

    iconSize:     [38, 95], // size of the icon
    shadowSize:   [50, 64], // size of the shadow
    iconAnchor:   [22, 94], // point of the icon which will correspond to marker's location
    shadowAnchor: [4, 62],  // the same for the shadow
    popupAnchor:  [-3, -76] // point from which the popup should open relative to the iconAnchor
});
</script>
<script>
    L.marker([51.5, -0.09], {icon: greenIcon}).addTo(map);
</script>


<script>
var geojsonFeature = {
    "type": "Feature",
    "properties": {
        "name": "Coors Field",
        "amenity": "Baseball Stadium",
        "popupContent": "This is where the Rockies play!"
    },
    "geometry": {
        "type": "Point",
        "coordinates": [-104.99404, 39.75621]
    }
};
</script>
<script>
  L.geoJSON(geojsonFeature).addTo(map);
</script>
<script>
var coords = geojsonFeature.geometry.coordinates;
var marker = L.marker([coords[1], coords[0]]).addTo(map);
marker.bindPopup("Usted está aquí").openPopup();
</script>
</body>
</html>
