<!DOCTYPE html>
<html>
<head>
  <title>Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>
<div id="map" style="height: 500px;"></div>
    <script>
  var map = L.map('map').setView([-34.6037, -58.3816], 13);
</script>
    <script>
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
</script>
<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);
</script>
<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);
  marker.bindPopup("Hola! Soy un popup 😄");
</script>


<script>
  var marker = L.marker([35.6895, 139.6917]).addTo(map);
</script><script>
  var marker = L.marker([55.4521, 37.3704]).addTo(map);
</script><script>
  var marker = L.marker([4.5981, -74.0758]).addTo(map);
</script>
<script>var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);</script>
</body>
</html>
